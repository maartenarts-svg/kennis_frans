<!DOCTYPE html>
<!-- ============================================================
 login.html — Frans Oefenplatform
============================================================ -->
<html lang="nl">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Inloggen — Frans Oefenplatform</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@400;600;700;800&display=swap" rel="stylesheet">
  <style>
    * { box-sizing: border-box; margin: 0; padding: 0; }

    body {
      font-family: 'Outfit', sans-serif;
      background: linear-gradient(135deg, #1a2a5e 0%, #c0392b 100%);
      min-height: 100vh;
      display: flex; align-items: center; justify-content: center;
      padding: 20px;
    }

    .login-card {
      background: white; border-radius: 20px; padding: 48px 40px;
      max-width: 420px; width: 100%;
      box-shadow: 0 20px 60px rgba(0,0,0,0.3);
      animation: fadeIn 0.5s ease;
    }

    @keyframes fadeIn {
      from { opacity: 0; transform: translateY(20px); }
      to   { opacity: 1; transform: translateY(0); }
    }

    .logo { text-align: center; margin-bottom: 32px; }

    .logo-icon {
      width: 64px; height: 64px;
      background: linear-gradient(135deg, #1a2a5e, #c0392b);
      border-radius: 16px;
      display: inline-flex; align-items: center; justify-content: center;
      font-size: 32px; margin-bottom: 16px;
      box-shadow: 0 8px 20px rgba(26,42,94,0.35);
    }

    h1 { font-size: 1.6rem; font-weight: 800; color: #1a1a2e; margin-bottom: 8px; }
    .subtitle { color: #6b7280; font-size: 0.95rem; }

    .btn {
      width: 100%; padding: 14px;
      background: linear-gradient(135deg, #1a2a5e, #c0392b);
      color: white; border: none; border-radius: 10px;
      font-size: 1rem; font-weight: 700; font-family: 'Outfit', sans-serif;
      cursor: pointer; transition: all 0.2s;
    }
    .btn:hover { transform: translateY(-2px); box-shadow: 0 8px 20px rgba(26,42,94,0.3); }
    .btn:disabled { opacity: 0.5; cursor: not-allowed; transform: none; }

    .message {
      margin-top: 16px; padding: 12px 16px; border-radius: 8px;
      font-size: 0.88rem; text-align: center; display: none;
    }
    .message.error  { background: #fee; color: #c33; border: 1px solid #fcc; display: block; }
    .message.success { background: #efe; color: #373; border: 1px solid #cfc; display: block; }

    .spinner {
      width: 20px; height: 20px;
      border: 3px solid white; border-top-color: transparent;
      border-radius: 50%; animation: spin 0.8s linear infinite;
      display: inline-block; vertical-align: middle; margin-right: 8px;
    }

    @keyframes spin { to { transform: rotate(360deg); } }

    @media (max-width: 500px) {
      .login-card { padding: 36px 28px; }
      h1 { font-size: 1.4rem; }
    }
  </style>
</head>
<body>

<div class="login-card">
  <div class="logo">
    <div class="logo-icon">🇫🇷</div>
    <h1>Frans Oefenplatform</h1>
    <p class="subtitle">Log in met je schoolaccount</p>
  </div>

  <button type="button" class="btn" id="btn-google" onclick="googleLogin()">
    Inloggen met Google
  </button>

  <div class="message" id="message"></div>
</div>

<script type="module">
import { db, auth } from './config.js';
import { GoogleAuthProvider, signInWithPopup, onAuthStateChanged, signOut }
  from 'https://www.gstatic.com/firebasejs/10.12.2/firebase-auth.js';
import { doc, getDoc } from 'https://www.gstatic.com/firebasejs/10.12.2/firebase-firestore.js';

// ── Redirect als al ingelogd ──
onAuthStateChanged(auth, (firebaseUser) => {
  if (!firebaseUser) return;
  const stored = localStorage.getItem('frans_user');
  if (!stored) return;
  try {
    const user = JSON.parse(stored);
    window.location.href = user.isAdmin ? 'dashboard.html' : 'index.html';
  } catch(e) {
    localStorage.removeItem('frans_user');
  }
});

// ── Google Sign-In ──
window.googleLogin = async function() {
  const btn = document.getElementById('btn-google');
  btn.disabled = true;
  btn.innerHTML = '<span class="spinner"></span> Verbinden...';
  verbergBericht();

  try {
    const provider = new GoogleAuthProvider();
    provider.setCustomParameters({ hd: 'labsintniklaas.be' });
    const result = await signInWithPopup(auth, provider);
    await verwerkGebruiker(result.user);
  } catch(err) {
    if (err.code !== 'auth/popup-closed-by-user' &&
        err.code !== 'auth/cancelled-popup-request') {
      toonFout(err.message || 'Er ging iets mis. Probeer opnieuw.');
    }
    resetKnop();
  }
};

async function verwerkGebruiker(firebaseUser) {
  const email = firebaseUser.email.toLowerCase();

  if (!email.endsWith('@labsintniklaas.be')) {
    await signOut(auth);
    toonFout('Gebruik je @labsintniklaas.be schoolaccount.');
    resetKnop();
    return;
  }

  // ── Beheerder? ──
  const beheerderSnap   = await getDoc(doc(db, 'FR_beheerders', 'beheerders'));
  const beheerderEmails = beheerderSnap.exists() ? (beheerderSnap.data().emails || []) : [];

  if (beheerderEmails.includes(email)) {
    localStorage.setItem('frans_user', JSON.stringify({
      email,
      naam:    firebaseUser.displayName || email,
      isAdmin: true
    }));
    toonOk(`Welkom, ${firebaseUser.displayName || email}!`);
    setTimeout(() => window.location.href = 'dashboard.html', 800);
    return;
  }

  // ── Leerling? ──
  const leerlingSnap = await getDoc(doc(db, 'FR_leerlingen', email));
  if (!leerlingSnap.exists()) {
    await signOut(auth);
    toonFout('Je account is niet geregistreerd. Neem contact op met je leerkracht.');
    resetKnop();
    return;
  }

  const data = leerlingSnap.data();
  localStorage.setItem('frans_user', JSON.stringify({
    email,
    naam:          data.naam          || email,
    isAdmin:       false,
    spellingshulp: data.spellingshulp || false
  }));
  toonOk(`Welkom, ${data.naam || email}!`);
  setTimeout(() => window.location.href = 'index.html', 800);
}

function resetKnop() {
  const btn = document.getElementById('btn-google');
  btn.disabled = false;
  btn.textContent = 'Inloggen met Google';
}

function toonFout(tekst) {
  document.getElementById('message').className = 'message error';
  document.getElementById('message').textContent = tekst;
}

function toonOk(tekst) {
  document.getElementById('message').className = 'message success';
  document.getElementById('message').textContent = `✓ ${tekst}`;
}

function verbergBericht() {
  const msg = document.getElementById('message');
  msg.className = 'message';
  msg.style.display = 'none';
}
</script>

</body>
</html>
