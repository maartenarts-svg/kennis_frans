<script type="module">
import { db } from './config.js';
import { grammaticaHTML as gr4 } from './grammatica/indicatif_present_soort4.js';
import {
  doc, getDoc, updateDoc, arrayUnion
} from 'https://www.gstatic.com/firebasejs/10.8.0/firebase-firestore.js';

// ── Constanten ──
const SOORT           = 'soort4';
const SPECIALE_TEKENS = ['ë','é','è','ê','ï','î','ô','œ','ü','û','ù','à','â','ç'];

// ── Persoonsverdeling (zonder onpersoonlijke werkwoorden) ──
const PERSOON_VERDELING = [
  ['1s', 1], ['2s', 1], ['3s', 2], ['1p', 2], ['2p', 2], ['3p', 2]
];

const PERSOON_NAAR_VERVOEGING = {
  '1s': 'je', '2s': 'tu', '3s': 'il', '1p': 'nous', '2p': 'vous', '3p': 'ils'
};

// ── State ──
let user         = null;
let config       = {};
let werkwoorden  = [];   // gewone onregelmatige werkwoorden
let onpersoonlijk = [];  // falloir, pleuvoir
let onderwerpen  = {};
let vragen       = [];
let huidigeIdx   = 0;
let punten       = 0;
let pogingTeller = 0;

// ── Login check ──
function checkLogin() {
  const stored = localStorage.getItem('frans_user');
  if (!stored) { window.location.href = 'login.html'; return null; }
  try {
    const u = JSON.parse(stored);
    if (u.isAdmin) { window.location.href = 'dashboard.html'; return null; }
    document.getElementById('user-label').textContent = u.naam || u.email;
    return u;
  } catch(e) {
    localStorage.removeItem('frans_user');
    window.location.href = 'login.html';
    return null;
  }
}

// ── Levenshtein afstand ──
function levenshtein(a, b) {
  const m = a.length, n = b.length;
  const dp = Array.from({length: m+1}, (_, i) => [i, ...Array(n).fill(0)]);
  for (let j = 0; j <= n; j++) dp[0][j] = j;
  for (let i = 1; i <= m; i++) {
    for (let j = 1; j <= n; j++) {
      dp[i][j] = a[i-1] === b[j-1]
        ? dp[i-1][j-1]
        : 1 + Math.min(dp[i-1][j], dp[i][j-1], dp[i-1][j-1]);
    }
  }
  return dp[m][n];
}

// ── Tikfout detectie voor onregelmatige werkwoorden ──
// Korte vormen (< minLengte): altijd exact
// Langere vormen: einde moet exact kloppen (laatste 3 letters), begin met tolerantie
function isTikfout(antwoord, correct) {
  if (antwoord === correct) return false;
  const minLengte = config.typfoutMinLengte || 5;

  // Korte vorm → altijd exact
  if (correct.length < minLengte) return false;

  // Langere vorm: controleer of de laatste 3 letters overeenkomen
  const aantalEinde = Math.min(3, correct.length);
  const eindeCorrect  = correct.slice(-aantalEinde);
  const eindeAntwoord = antwoord.slice(-aantalEinde);
  if (eindeCorrect !== eindeAntwoord) return false;

  // Begin mag 1 afwijking hebben
  const beginCorrect  = correct.slice(0, correct.length - aantalEinde);
  const beginAntwoord = antwoord.slice(0, antwoord.length - aantalEinde);
  return levenshtein(beginCorrect, beginAntwoord) <= 1;
}

// ── Hulpfuncties ──
function rand(min, max) { return Math.floor(Math.random() * (max - min + 1)) + min; }

function kiesPersoon(gebruikteCombi) {
  const totaalGewicht = PERSOON_VERDELING.reduce((s, [, g]) => s + g, 0);
  for (let poging = 0; poging < 100; poging++) {
    let r = Math.random() * totaalGewicht;
    let gekozen = PERSOON_VERDELING[PERSOON_VERDELING.length - 1][0];
    for (const [persoon, gewicht] of PERSOON_VERDELING) {
      r -= gewicht;
      if (r <= 0) { gekozen = persoon; break; }
    }
    const beschikbaar = werkwoorden.some(w =>
      !gebruikteCombi.has(`${w.infinitief}__${gekozen}`)
    );
    if (beschikbaar) return gekozen;
  }
  return null;
}

function kiesOnderwerp(persoon, percentageVariant) {
  const data = onderwerpen[persoon];
  if (!data) return persoon;
  // 1s en 2s: altijd standaard
  if (persoon === '1s' || persoon === '2s') return data.standaard;
  if (Math.random() * 100 < percentageVariant) {
    const varianten = data.varianten.filter(v => v !== data.standaard);
    if (!varianten.length) return data.standaard;
    return varianten[rand(0, varianten.length - 1)];
  }
  return data.standaard;
}

// ── Genereer vragen ──
function genereer() {
  const totaal     = config.aantalOpgaven || 10;
  const pctVariant = config.percentageVariant ?? 30;
  const gebruikteCombi = new Set();
  const lijst      = [];
  const verplicht  = [];

  // ── Verplicht: minstens één onpersoonlijk werkwoord ──
  if (onpersoonlijk.length) {
    const ww = onpersoonlijk[rand(0, onpersoonlijk.length - 1)];
    const combiSleutel = `${ww.infinitief}__3s_onpers`;
    gebruikteCombi.add(combiSleutel);
    verplicht.push({
      werkwoord:   ww,
      subsoort:    'soort4',
      persoon:     '3s',
      onderwerp:   'il',
      vervoeging:  ww.vervoegingen.il,
      infinitief:  ww.infinitief,
      vertaling:   ww.vertaling,
      grammatica:  ww.grammatica,
      onpersoonlijk: true
    });
  }

  // ── Genereer de rest met gewone werkwoorden ──
  const aantalRest = totaal - verplicht.length;
  let pogingen = 0;

  while (lijst.length < aantalRest && pogingen < 300) {
    pogingen++;
    const ww      = werkwoorden[rand(0, werkwoorden.length - 1)];
    const persoon = kiesPersoon(gebruikteCombi);
    if (!persoon) break;

    const combiSleutel = `${ww.infinitief}__${persoon}`;
    if (gebruikteCombi.has(combiSleutel)) continue;
    gebruikteCombi.add(combiSleutel);

    const onderwerp   = kiesOnderwerp(persoon, pctVariant);
    const vervSleutel = PERSOON_NAAR_VERVOEGING[persoon];
    const vervoeging  = ww.vervoegingen[vervSleutel];

    // Elisie
    let onderwerpTonen = onderwerp;
    if (persoon === '1s' && /^[aeiouyéèêëàâùûüœhî]/i.test(vervoeging)) {
      if (onderwerp === 'je') onderwerpTonen = "j'";
    }

    lijst.push({
      werkwoord:  ww,
      subsoort:   'soort4',
      persoon,
      onderwerp:  onderwerpTonen,
      vervoeging,
      infinitief: ww.infinitief,
      vertaling:  ww.vertaling,
      grammatica: ww.grammatica,
      onpersoonlijk: false
    });
  }

  // Voeg verplichte vragen toe en schud door elkaar
  lijst.push(...verplicht);
  for (let i = lijst.length - 1; i > 0; i--) {
    const j = rand(0, i);
    [lijst[i], lijst[j]] = [lijst[j], lijst[i]];
  }

  return lijst;
}

// ── Voortgang updaten ──
function updateVoortgang() {
  const totaal = vragen.length;
  const pct    = (huidigeIdx / totaal) * 100;
  document.getElementById('progress-fill').style.width = pct + '%';
  document.getElementById('progress-tekst').textContent =
    huidigeIdx < totaal ? `Vraag ${huidigeIdx + 1} van ${totaal}` : 'Klaar!';
  document.getElementById('score-live').textContent = `${punten} / ${huidigeIdx} pt`;
}

// ── Vraag tonen ──
function toonVraag() {
  if (huidigeIdx >= vragen.length) { toonEindscherm(); return; }

  pogingTeller = 0;
  updateVoortgang();
  const vraag = vragen[huidigeIdx];

  document.getElementById('inhoud').innerHTML = `
    <div class="oefening-kaart" id="oef-kaart">
      <p class="vraag-label">Vul de juiste vervoeging in</p>
      <div class="vraag-rij">
        <span class="onderwerp">${vraag.onderwerp}</span>
        <input
          class="invoer"
          id="invoer"
          type="text"
          autocomplete="off"
          autocorrect="off"
          autocapitalize="off"
          spellcheck="false"
          inputmode="text"
        >
        <span class="infinitief">(${vraag.infinitief})</span>
      </div>
      <div class="tekens-balk" id="tekens-balk">
        ${SPECIALE_TEKENS.map(t =>
          `<button class="teken-btn" tabindex="-1" onclick="voegTekenIn('${t}')">${t}</button>`
        ).join('')}
      </div>
      <div class="knoppen-rij">
        <button class="btn btn-primair" id="controleer-btn" disabled>Controleer</button>
        <button class="btn btn-succes" id="volgende-btn" style="display:none">Volgende vraag →</button>
      </div>
      <div class="feedback-box" id="feedback-box"></div>
      <div class="grammatica-blok" id="grammatica-blok"></div>
    </div>`;

  const invoer        = document.getElementById('invoer');
  const controleerBtn = document.getElementById('controleer-btn');
  const tekensBalk    = document.getElementById('tekens-balk');

  invoer.addEventListener('input', () => {
    controleerBtn.disabled = invoer.value.trim() === '';
    if (user.spellingshulp) {
      const ant = invoer.value.trim().toLowerCase();
      const cor = vragen[huidigeIdx].vervoeging.toLowerCase();
      invoer.style.textDecoration =
        ant.length >= 2 && ant !== cor && levenshtein(ant, cor) > 2
          ? 'underline wavy red' : '';
    }
  });

  invoer.addEventListener('keydown', e => {
    if (e.key === 'Enter' && !controleerBtn.disabled) controleer();
  });

  invoer.addEventListener('focus', () => tekensBalk.classList.add('zichtbaar'));

  controleerBtn.addEventListener('click', controleer);
  document.getElementById('volgende-btn').addEventListener('click', () => toonVraag());

  invoer.focus();
}

// ── Teken invoegen ──
window.voegTekenIn = function(teken) {
  const invoer = document.getElementById('invoer');
  if (!invoer) return;
  const start = invoer.selectionStart;
  const einde = invoer.selectionEnd;
  invoer.value = invoer.value.slice(0, start) + teken + invoer.value.slice(einde);
  invoer.selectionStart = invoer.selectionEnd = start + teken.length;
  invoer.focus();
  invoer.dispatchEvent(new Event('input'));
  document.getElementById('controleer-btn').disabled = invoer.value.trim() === '';
};

// ── Controleer antwoord ──
function controleer() {
  const vraag         = vragen[huidigeIdx];
  const invoer        = document.getElementById('invoer');
  const fbBox         = document.getElementById('feedback-box');
  const grBlok        = document.getElementById('grammatica-blok');
  const controleerBtn = document.getElementById('controleer-btn');
  const volgendeBtn   = document.getElementById('volgende-btn');

  const antwoord   = invoer.value.trim();
  const correct    = vraag.vervoeging;
  const isCorrect  = antwoord.toLowerCase() === correct.toLowerCase();

  // Onpersoonlijke werkwoorden: nooit tikfout-tolerantie
  const isTikfoutB = !isCorrect && !vraag.onpersoonlijk &&
    isTikfout(antwoord.toLowerCase(), correct.toLowerCase());

  // ── CORRECT ──
  if (isCorrect) {
    invoer.classList.add('correct');
    invoer.style.textDecoration = '';
    punten += pogingTeller === 0 ? 1 : 0.5;
    huidigeIdx++;
    fbBox.className = 'feedback-box succes';
    fbBox.innerHTML = pogingTeller === 0
      ? '✅ Correct! Goed gedaan!'
      : '✅ Correct bij de tweede kans!';
    fbBox.style.display = 'block';
    controleerBtn.style.display = 'none';
    volgendeBtn.style.display   = 'inline-block';
    invoer.disabled = true;
    updateVoortgang();
    return;
  }

  // ── TIKFOUT (eerste poging) ──
  if (isTikfoutB && pogingTeller === 0) {
    invoer.classList.add('tikfout');
    invoer.style.textDecoration = '';
    fbBox.className = 'feedback-box tikfout';
    fbBox.innerHTML = '⚠️ Je antwoord bevat een tikfout. Probeer opnieuw.';
    fbBox.style.display = 'block';
    pogingTeller = 1;
    setTimeout(() => {
      invoer.classList.remove('tikfout');
      invoer.disabled = false;
      invoer.focus();
      controleerBtn.disabled = false;
    }, 800);
    return;
  }

  // ── GROTE FOUT ──
  invoer.classList.add('fout');
  invoer.style.textDecoration = '';
  huidigeIdx++;
  fbBox.className = 'feedback-box fout';
  fbBox.innerHTML = `❌ Het juiste antwoord is <strong>${correct}</strong>.`;
  fbBox.style.display  = 'block';
  grBlok.innerHTML     = gr4(vraag.werkwoord);
  grBlok.style.display = 'block';
  controleerBtn.style.display = 'none';
  volgendeBtn.style.display   = 'inline-block';
  invoer.disabled = true;
  updateVoortgang();
}

// ── Eindscherm ──
function toonEindscherm() {
  updateVoortgang();
  const drempelA = config.drempelA ?? 8.5;
  const drempelB = config.drempelB ?? 7.0;
  const totaal   = vragen.length;

  let algScore, emoji, bericht;
  if (punten >= drempelA) {
    algScore = 'A'; emoji = '🌟';
    bericht  = 'Uitstekend! Je beheerst de onregelmatige werkwoorden heel goed.';
  } else if (punten >= drempelB) {
    algScore = 'B'; emoji = '😊';
    bericht  = 'Goed gedaan! Je bent goed op weg. Blijf oefenen!';
  } else {
    algScore = 'C'; emoji = '📚';
    bericht  = 'Oefen nog wat verder. Je kan dit zeker verbeteren!';
  }

  document.getElementById('inhoud').innerHTML = `
    <div class="eindscherm">
      <div class="eind-emoji">${emoji}</div>
      <div class="eind-punten">${punten}/${totaal}</div>
      <div class="eind-score-label">Je haalde ${punten}/${totaal}</div>
      <div class="score-badge ${algScore}">Score: ${algScore}</div>
      <div class="eind-bericht">${bericht}</div>
      <button class="btn btn-primair" id="terug-btn">← Terug naar oefeningen</button>
    </div>`;

  document.getElementById('terug-btn').addEventListener('click', () => {
    window.location.href = 'index.html';
  });

  slaanOp(algScore);
}

// ── Opslaan in Firebase ──
async function slaanOp(algScore) {
  try {
    await updateDoc(doc(db, 'leerlingen', user.email), {
      resultaten: arrayUnion({
        soort:  SOORT,
        score:  algScore,
        punten: punten,
        datum:  new Date().toISOString()
      })
    });
  } catch(err) {
    console.error('Fout bij opslaan:', err);
  }
}

// ── Init ──
async function init() {
  user = checkLogin();
  if (!user) return;

  try {
    const [configSnap, leerlingSnap, werkwoordSnap, onderwerpSnap] = await Promise.all([
      getDoc(doc(db, 'config', 'indicatif_present_soort4')),
      getDoc(doc(db, 'leerlingen', user.email)),
      getDoc(doc(db, 'werkwoorden', 'indicatif_present')),
      getDoc(doc(db, 'onderwerpen', 'personen'))
    ]);

    config       = configSnap.exists()    ? configSnap.data()    : {};
    onderwerpen  = onderwerpSnap.exists() ? onderwerpSnap.data() : {};

    // Verzamel toegestane werkwoorden via groepen
    const groepIds = leerlingSnap.exists() ? (leerlingSnap.data().groepen || []) : [];
    const toegestaan = new Set();
    for (const groepId of groepIds) {
      const groepSnap = await getDoc(doc(db, 'groepen', groepId));
      if (groepSnap.exists()) {
        (groepSnap.data().werkwoorden || []).forEach(w => toegestaan.add(w));
      }
    }

    if (!toegestaan.size) {
      document.getElementById('inhoud').innerHTML =
        `<div style="text-align:center;padding:60px;color:var(--muted)">⚠️ Er zijn nog geen werkwoorden toegewezen aan jouw groep. Neem contact op met je leerkracht.</div>`;
      return;
    }

    const data    = werkwoordSnap.exists() ? werkwoordSnap.data() : {};
    werkwoorden   = (data.soort4       || []).map(w => ({ ...w, subsoort: 'soort4', onpersoonlijk: false }))
                    .filter(w => toegestaan.has(w.infinitief));
    onpersoonlijk = (data.onpersoonlijk || []).map(w => ({ ...w, subsoort: 'soort4', onpersoonlijk: true }))
                    .filter(w => toegestaan.has(w.infinitief));

    if (!werkwoorden.length) {
      document.getElementById('inhoud').innerHTML =
        `<div style="text-align:center;padding:60px;color:var(--muted)">Geen werkwoorden gevonden voor deze oefening.</div>`;
      return;
    }

    vragen = genereer();
    toonVraag();

  } catch(err) {
    console.error('Fout bij laden:', err);
    document.getElementById('inhoud').innerHTML =
      `<div style="text-align:center;padding:60px;color:var(--muted)">⚠️ Kon de oefening niet laden: ${err.message}</div>`;
  }
}

init();
</script>
